server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Back4App's health check probes "/" with an OPTIONS request. By default
    # nginx answers OPTIONS on static files with 405 Method Not Allowed, which
    # the platform reads as "unhealthy" and keeps restarting the container.
    # Answer health-check probes with 200 instead.
    if ($request_method = OPTIONS) {
        return 200;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
